---
- name: Ensure prometheus group exists
  ansible.builtin.group:
    name: "{{ prometheus_group }}"
    system: true

- name: Ensure prometheus user exists
  ansible.builtin.user:
    name: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    system: true
    shell: /sbin/nologin
    create_home: false

- name: Ensure prometheus directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: "0755"
  loop:
    - /etc/prometheus
    - /var/lib/prometheus

- name: Download prometheus archive
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/prometheus/releases/download/v{{ prometheus_version }}/prometheus-{{ prometheus_version }}.{{ prometheus_arch }}.tar.gz"
    dest: "/tmp/prometheus-{{ prometheus_version }}.{{ prometheus_arch }}.tar.gz"
    mode: "0644"

- name: Extract prometheus archive
  ansible.builtin.unarchive:
    src: "/tmp/prometheus-{{ prometheus_version }}.{{ prometheus_arch }}.tar.gz"
    dest: /tmp
    remote_src: true

- name: Install prometheus binary
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.{{ prometheus_arch }}/prometheus"
    dest: /usr/local/bin/prometheus
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart prometheus

- name: Install promtool binary
  ansible.builtin.copy:
    src: "/tmp/prometheus-{{ prometheus_version }}.{{ prometheus_arch }}/promtool"
    dest: /usr/local/bin/promtool
    owner: root
    group: root
    mode: "0755"
    remote_src: true


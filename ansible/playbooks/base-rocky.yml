---
- name: Apply base configuration to hosts
  hosts: admin
  become: true
  gather_facts: true

  tasks:
    - name: Show target host information
      ansible.builtin.debug:
        msg: 
          - "Host: {{ ansible_hostname }}"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "User: {{ ansible_user }}"

    - name: Ensure base packages are installed
      ansible.builtin.dnf:
        name:
          - git
          - vim-enhanced
          - tree
          - wget
          - curl
          - rsync
          - python3
          - openssh-clients
          - bash-completion
        state: present
